<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e17"/>
      <stop offset="100%" style="stop-color:#131825"/>
    </linearGradient>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00e5b0"/>
      <stop offset="100%" style="stop-color:#00d4ff"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c5cfc"/>
      <stop offset="100%" style="stop-color:#00e5b0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <circle cx="256" cy="220" r="120" fill="none" stroke="url(#g1)" stroke-width="8" opacity="0.3"/>
  <circle cx="256" cy="220" r="85" fill="none" stroke="url(#g1)" stroke-width="12" filter="url(#glow)"/>
  <text x="256" y="245" text-anchor="middle" fill="url(#g1)" font-family="Arial Black,sans-serif" font-size="100" font-weight="900">E</text>
  <text x="256" y="370" text-anchor="middle" fill="url(#g1)" font-family="Arial Black,sans-serif" font-size="48" font-weight="900">EarnHub</text>
  <text x="256" y="410" text-anchor="middle" fill="#8a95b0" font-family="Arial,sans-serif" font-size="22">Watch • Earn • Withdraw</text>
  <circle cx="160" cy="150" r="4" fill="#00e5b0" opacity="0.6"/>
  <circle cx="350" cy="170" r="3" fill="#7c5cfc" opacity="0.5"/>
  <circle cx="180" cy="300" r="3" fill="#00d4ff" opacity="0.4"/>
  <circle cx="340" cy="280" r="4" fill="#00e5b0" opacity="0.5"/>
</svg>
