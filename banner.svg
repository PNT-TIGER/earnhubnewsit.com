<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050810"/>
      <stop offset="100%" style="stop-color:#0a0e1a"/>
    </linearGradient>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00e5b0"/>
      <stop offset="100%" style="stop-color:#00d4ff"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c5cfc"/>
      <stop offset="100%" style="stop-color:#4a6cf7"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="800" height="400" rx="20" fill="url(#bg)"/>
  <!-- Background circles -->
  <circle cx="650" cy="80" r="150" fill="#00e5b0" opacity="0.03"/>
  <circle cx="150" cy="350" r="120" fill="#7c5cfc" opacity="0.03"/>
  <!-- Dollar signs floating -->
  <text x="100" y="80" fill="#00e5b0" opacity="0.15" font-size="40" font-weight="900">$</text>
  <text x="700" y="350" fill="#00e5b0" opacity="0.12" font-size="50" font-weight="900">$</text>
  <text x="650" y="100" fill="#7c5cfc" opacity="0.1" font-size="35" font-weight="900">$</text>
  <text x="50" y="320" fill="#7c5cfc" opacity="0.08" font-size="45" font-weight="900">$</text>
  <!-- Main content -->
  <circle cx="200" cy="180" r="70" fill="none" stroke="url(#g1)" stroke-width="5" filter="url(#glow)"/>
  <text x="200" y="200" text-anchor="middle" fill="url(#g1)" font-family="Arial Black,sans-serif" font-size="70" font-weight="900">E</text>
  <text x="480" y="165" text-anchor="middle" fill="url(#g1)" font-family="Arial Black,sans-serif" font-size="72" font-weight="900">EarnHub</text>
  <text x="480" y="210" text-anchor="middle" fill="#8a95b0" font-family="Arial,sans-serif" font-size="22">Watch Ads • Earn Money • Withdraw</text>
  <!-- Stats bar -->
  <rect x="100" y="280" width="600" height="70" rx="15" fill="#131825" stroke="#1e2a3a" stroke-width="1"/>
  <text x="220" y="310" text-anchor="middle" fill="#00e5b0" font-family="Arial Black,sans-serif" font-size="22" font-weight="900">$0.0020</text>
  <text x="220" y="335" text-anchor="middle" fill="#8a95b0" font-family="Arial,sans-serif" font-size="12">Per Ad View</text>
  <line x1="340" y1="290" x2="340" y2="340" stroke="#1e2a3a" stroke-width="1"/>
  <text x="430" y="310" text-anchor="middle" fill="#7c5cfc" font-family="Arial Black,sans-serif" font-size="22" font-weight="900">10%</text>
  <text x="430" y="335" text-anchor="middle" fill="#8a95b0" font-family="Arial,sans-serif" font-size="12">Referral Bonus</text>
  <line x1="530" y1="290" x2="530" y2="340" stroke="#1e2a3a" stroke-width="1"/>
  <text x="620" y="310" text-anchor="middle" fill="#00d4ff" font-family="Arial Black,sans-serif" font-size="22" font-weight="900">$1.00</text>
  <text x="620" y="335" text-anchor="middle" fill="#8a95b0" font-family="Arial,sans-serif" font-size="12">Min Withdraw</text>
</svg>
